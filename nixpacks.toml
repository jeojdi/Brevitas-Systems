# Railway / Nixpacks build config for the FastAPI backend (api/).
# Vercel ignores this file — it only governs the Railway deploy.
# The repo root is the build context so token_efficiency_model/ ships with it.
#
# We build inside a virtualenv: the nix `python311` package ships the
# interpreter without pip on PATH, and modern pip refuses to install into the
# read-only nix system Python (PEP 668). A venv bootstraps its own pip cleanly.

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r api/requirements.txt"
]

[start]
cmd = "/opt/venv/bin/uvicorn api.server:app --host 0.0.0.0 --port $PORT"
