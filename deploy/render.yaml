services:
  - type: web
    name: brevitas-compress
    runtime: docker
    dockerfilePath: ./services/compress/Dockerfile
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: BREVITAS_COMPRESS_TOKEN
        scope: run
        sync: false
    plan: standard
    instanceCount: 1
    disk:
      size: 5GB
    memoryLimit: 2048
    cpuLimit: 1
