{
  "extensions": {
    "health_check": {"endpoint": "0.0.0.0:13133"}
  },
  "receivers": {
    "otlp": {
      "protocols": {
        "grpc": {"endpoint": "0.0.0.0:4317"},
        "http": {"endpoint": "0.0.0.0:4318"}
      }
    }
  },
  "processors": {
    "memory_limiter": {
      "check_interval": "1s",
      "limit_mib": 256,
      "spike_limit_mib": 64
    },
    "batch": {
      "send_batch_size": 512,
      "send_batch_max_size": 1024,
      "timeout": "5s"
    },
    "resource": {
      "attributes": [
        {"key": "brevitas.telemetry.schema", "value": "1", "action": "upsert"}
      ]
    }
  },
  "exporters": {
    "otlphttp/monitoring": {
      "endpoint": "${env:OBSERVABILITY_OTLP_UPSTREAM_ENDPOINT}",
      "headers": {"Authorization": "${env:OBSERVABILITY_OTLP_UPSTREAM_AUTHORIZATION}"},
      "compression": "gzip",
      "timeout": "10s",
      "retry_on_failure": {
        "enabled": true,
        "initial_interval": "1s",
        "max_interval": "30s",
        "max_elapsed_time": "5m"
      },
      "sending_queue": {
        "enabled": true,
        "num_consumers": 4,
        "queue_size": 2048
      }
    }
  },
  "service": {
    "extensions": ["health_check"],
    "telemetry": {"logs": {"level": "warn"}},
    "pipelines": {
      "traces": {
        "receivers": ["otlp"],
        "processors": ["memory_limiter", "resource", "batch"],
        "exporters": ["otlphttp/monitoring"]
      },
      "metrics": {
        "receivers": ["otlp"],
        "processors": ["memory_limiter", "resource", "batch"],
        "exporters": ["otlphttp/monitoring"]
      }
    }
  }
}
