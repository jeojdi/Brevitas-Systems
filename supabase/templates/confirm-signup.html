<!doctype html>
<html lang="en">
<body style="margin:0;background:#eef0f7;color:#0d1530;font-family:Arial,sans-serif;padding:32px 16px">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr><td align="center">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e2e4f0;border-radius:20px">
        <tr><td style="padding:42px">
          <img src="https://brevitassystems.com/assets/b-logo-tight.png" width="180" alt="Brevitas" style="display:block;width:180px;height:auto;margin:0 0 32px">
          <p style="margin:0 0 10px;color:#4f5fc4;font-family:monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase">Confirm your account</p>
          <h1 style="margin:0 0 16px;font-family:Georgia,serif;font-size:36px;font-weight:400;line-height:1.15">One click and you're in.</h1>
          <p style="margin:0 0 28px;color:#687092;font-size:15px;line-height:1.65">Confirm <strong>{{ .Email }}</strong> to finish creating your Brevitas account and open your token tracking dashboard.</p>
          <a href="{{ .ConfirmationURL }}" style="display:block;padding:14px 20px;background:#4f5fc4;border-radius:11px;color:#ffffff;text-align:center;text-decoration:none;font-weight:bold">Confirm email address →</a>
          <p style="margin:28px 0 0;color:#8b93b8;font-size:12px;line-height:1.6">If you didn't create a Brevitas account, you can safely ignore this email. This link expires automatically.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
