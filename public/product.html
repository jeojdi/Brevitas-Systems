<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product · Brevitas Systems</title>
<meta name="description" content="A drop-in Python SDK that optimizes inter-agent communication. Wraps your existing orchestration.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="theme-init.js" defer></script>
<link rel="stylesheet" href="/responsive.css">
</head>
<body>
<div class="noise"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="animations.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function MatrixRow({ label, items, caption }) {
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '200px 1fr',
      gap: 32,
      padding: '28px 0',
      borderBottom: '1px solid var(--line)',
      alignItems: 'start',
    }} className="matrix-row">
      <div>
        <div className="t-overline" style={{ color: 'var(--stone)' }}>{label}</div>
      </div>
      <div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '10px 22px', marginBottom: caption ? 12 : 0 }}>
          {items.map((it, i) => (
            <span key={i} className="mono" style={{
              color: 'var(--fg)',
              fontSize: 15,
              padding: '4px 10px',
              border: '1px solid var(--line)',
              borderRadius: 2,
            }}>{it}</span>
          ))}
        </div>
        {caption && <div className="t-mono" style={{ color: 'var(--stone)', marginTop: 10 }}>{caption}</div>}
      </div>
    </div>
  );
}

function ProductPage() {
  useFadeUpReveal();
  return (
    <>
      <Nav current="product" />

      {/* Hero */}
      <SectionShell>
        <h1 className="t-display fade-up in" style={{ margin: '32px 0 24px', maxWidth: 1100 }}>
          Your AI agents are expensive. We make them <em style={{ fontStyle: 'italic', color: 'var(--bronze)' }}>a lot cheaper.</em>
        </h1>
        <p className="t-body-lg fade-up delay-1 in" style={{ maxWidth: 720, marginBottom: 48 }}>
          Two lines wrap your existing pipeline. Your agents, prompts, and providers stay exactly as they are. Brevitas sits <em style={{ fontStyle: 'italic', color: 'var(--bronze)' }}>between</em> them and quietly cuts your bill — typically 40–60%.
        </p>
        <div style={{ maxWidth: 780 }}>
          <CodeBlockPy
            filename="pipeline.py"
            copyable
            source={`from brevitas import optimize

# Before
pipeline = [architect, builder, reviewer]
result = run_pipeline(pipeline, task)

# After
pipeline = optimize([architect, builder, reviewer])
result = run_pipeline(pipeline, task)
# ↳ 59% fewer tokens. 47% lower cost. 99% quality parity.`}
          />
        </div>
      </SectionShell>

      {/* What it is */}
      <section className="section" style={{ borderTop: '1px solid var(--line)' }}>
        <div className="container" style={{ maxWidth: 760 }}>
          <h2 className="t-h2" style={{ margin: '0 0 28px' }}>
            <em style={{ fontStyle: 'italic' }}>Your biggest AI cost isn't a single expensive call. It's what compounds across every hop.</em>
          </h2>
          <p className="t-body-lg" style={{ marginBottom: 24 }}>
            Per-call compressors and provider caches can only see one message at a time. The real money in a multi-agent pipeline is what flows between calls — the same context re-serialized and billed at every hop.
          </p>
          <p className="t-body" style={{ marginBottom: 24 }}>
            Brevitas sees the whole pipeline. It compresses, deduplicates, and references across every hop — not just within one. That's the distinction that makes the numbers move.
          </p>
          <p className="t-body">
            Works with any orchestrator. Agnostic to your prompts and models. Plugs into what you've already built. No lock-in, no rearchitecting.
          </p>
        </div>
      </section>

      {/* Composition matrix */}
      <section className="section" style={{ borderTop: '1px solid var(--line)', position: 'relative', overflow: 'hidden' }}>
        <video preload="metadata" poster="/assets/ascii-magic-3-poster.jpg" autoPlay muted loop playsInline style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: 0.55, zIndex: 0, pointerEvents: 'none' }}>
          <source src="/assets/ascii-magic-3.mp4" type="video/mp4" />
        </video>
        <div className="container" style={{ position: 'relative', zIndex: 1 }}>
          <h2 className="t-h2" style={{ marginTop: 0, marginBottom: 48, maxWidth: 900 }}>
            Your stack, unchanged.
          </h2>
          <div style={{ borderTop: '1px solid var(--line)' }}>
            <MatrixRow
              label="ORCHESTRATORS"
              items={['LangGraph', 'CrewAI', 'AutoGen', 'OpenAI Swarm', 'Custom']}
              caption="We don't require a specific orchestrator. Pass in callables; get callables back."
            />
            <MatrixRow
              label="PROVIDERS"
              items={['OpenAI', 'Anthropic', 'Google', 'DeepSeek', 'Groq', 'Together', 'any /chat/completions']}
              caption="We don't require a specific provider. Three providers running simultaneously in one pipeline is the common case we validate against."
            />
            <MatrixRow
              label="RUNTIMES"
              items={['Python 3.10+', 'any standard Python environment']}
              caption="No sidecar. No daemon. No separate infrastructure."
            />
          </div>
        </div>
      </section>

      {/* What it does, in five moves */}
      <section className="section" style={{ borderTop: '1px solid var(--line)' }}>
        <div className="container">
          <h2 className="t-h2" style={{ marginTop: 0, marginBottom: 56, maxWidth: 900 }}>
            Five ways we cut your bill. Routed per call so you only pay for what earns its keep.
          </h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {[
              {
                n: '01',
                h: 'Compress. The 40% win.',
                b: 'Every inter-agent message is compressed before the next model bills for it. Connective filler drops; meaning-bearing tokens stay. This one technique typically recovers 40% of inter-agent token spend.',
                code: `msg = compress(agent1.output, task_class="code")`,
              },
              {
                n: '02',
                h: 'Reference. Stop paying for the same content twice.',
                b: 'Agent outputs are stored once and referenced downstream — not re-serialized and re-billed at every hop. Equivalent to deduplication at the billing layer.',
                code: `memory.put("a1_output") -> "mem://a1:7f3b"`,
              },
              {
                n: '03',
                h: 'Delta. Only send what changed.',
                b: 'After the first full context pass, subsequent agent calls receive only the changes — not the entire history re-billed. Analogous to how version control stopped sending full file copies.',
                code: `delta = diff(state_t, state_t_minus_1)`,
              },
              {
                n: '04',
                h: 'Prune. Cut what the next agent won\'t use.',
                b: 'A relevance pass drops context the next agent — given its role and task class — is statistically unlikely to use. You stop paying for tokens that were never going to matter.',
                code: `ctx = prune(ctx, role="reviewer")`,
              },
              {
                n: '05',
                h: 'Route. Apply only what earns its keep.',
                b: 'Task-aware routing decides which optimizations to apply per call. Not every call benefits from every technique — the router makes sure you\'re only spending compute where it drives savings.',
                code: `router.decide(call) -> [compress, delta]`,
              },
            ].map((x, i) => (
              <div key={i} className="fade-up" style={{
                display: 'grid',
                gridTemplateColumns: '80px 1fr 1.1fr',
                gap: 40,
                padding: '40px 0',
                borderTop: '1px solid var(--line)',
                alignItems: 'start',
              }}>
                <div className="t-mono" style={{ color: 'var(--stone)', fontSize: 14 }}>{x.n}</div>
                <div>
                  <h3 className="serif" style={{ fontSize: 32, fontWeight: 400, letterSpacing: '-0.015em', margin: '0 0 16px 0' }}>{x.h}</h3>
                  <p className="t-body" style={{ margin: 0, maxWidth: 520 }}>{x.b}</p>
                </div>
                <div>
                  <div style={{
                    fontFamily: 'JetBrains Mono, ui-monospace, monospace',
                    fontSize: 13,
                    color: 'var(--signal)',
                    background: 'var(--ink-2)',
                    border: '1px solid var(--line)',
                    borderRadius: 2,
                    padding: '14px 18px',
                    lineHeight: 1.6,
                  }}>
                    <span style={{ color: 'var(--stone)' }}># </span>
                    {x.code}
                  </div>
                </div>
              </div>
            ))}
          </div>
          <style>{`
            @media (max-width: 900px) {
              .section .grid-12 { grid-template-columns: 1fr; }
            }
          `}</style>
        </div>
      </section>

      {/* Integration walkthrough */}
      <section className="section" style={{ borderTop: '1px solid var(--line)' }}>
        <div className="container">
          <h2 className="t-h2" style={{ marginTop: 0, marginBottom: 48, maxWidth: 820 }}>Four steps. Five minutes.</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 40, maxWidth: 820 }}>
            <div>
              <div className="t-mono" style={{ color: 'var(--bronze)', marginBottom: 10 }}>STEP 01 — INSTALL</div>
              <CodeBlockPy source={`# Contact us for access — james@brevitassystems.com`} />
            </div>
            <div>
              <div className="t-mono" style={{ color: 'var(--bronze)', marginBottom: 10 }}>STEP 02 — WRAP YOUR PIPELINE</div>
              <CodeBlockPy filename="pipeline.py" copyable source={`from brevitas import optimize
from my_pipeline import architect, builder, reviewer

pipeline = optimize([architect, builder, reviewer])`} />
            </div>
            <div>
              <div className="t-mono" style={{ color: 'var(--bronze)', marginBottom: 10 }}>STEP 03 — RUN AS NORMAL</div>
              <CodeBlockPy filename="pipeline.py" copyable source={`result = pipeline.run(task)`} />
            </div>
            <div>
              <div className="t-mono" style={{ color: 'var(--bronze)', marginBottom: 10 }}>STEP 04 — INSPECT THE REPORT</div>
              <CodeBlockPy filename="pipeline.py" copyable source={`report = pipeline.report()
# {
#   "tokens_in": 2924, "tokens_out": 1188,
#   "cost_baseline": 0.001616, "cost_optimized": 0.000857,
#   "savings_by_technique": {
#     "compress": 0.41, "reference": 0.22, "delta": 0.11,
#     "prune": 0.08, "protocol": 0.04
#   }
# }`} />
            </div>
          </div>
        </div>
      </section>

      {/* What it doesn't do */}
      <section className="section" style={{ borderTop: '1px solid var(--line)' }}>
        <div className="container" style={{ maxWidth: 820 }}>
          <h2 className="t-h2" style={{ margin: '0 0 32px' }}>
            <em style={{ fontStyle: 'italic' }}>What Brevitas is not.</em>
          </h2>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 16 }}>
            {[
              ['Not an orchestrator.', 'Use yours.'],
              ['Not a prompt compressor for single calls.', 'See The Token Company or LLMLingua for that.'],
              ['Not a model router.', 'See Martian or OpenRouter.'],
              ['Not an observability tool.', 'See Helicone, Langfuse, Portkey.'],
              ['Not opinionated about your agents\' prompts.', 'They\'re yours.'],
            ].map(([h, b], i) => (
              <li key={i} style={{ display: 'flex', gap: 20, paddingBottom: 16, borderBottom: '1px solid var(--line)' }}>
                <span className="t-mono" style={{ color: 'var(--stone)', flexShrink: 0, width: 24 }}>−</span>
                <div>
                  <div className="serif" style={{ fontSize: 22, fontWeight: 400, color: 'var(--fg)', marginBottom: 4 }}>{h}</div>
                  <div className="t-body" style={{ color: 'var(--stone-2)', fontSize: 15 }}>{b}</div>
                </div>
              </li>
            ))}
          </ul>
        </div>
      </section>

      {/* Final CTA */}
      <section className="section" style={{ background: 'var(--ink-2)', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)' }}>
        <div className="container">
          <div style={{ maxWidth: 820 }}>
            <h2 className="t-h1" style={{ marginTop: 0, marginBottom: 20 }}>Get your pipeline benchmarked.</h2>
            <p className="t-body-lg" style={{ marginBottom: 40, maxWidth: 680 }}>
              Tell us what you're running. We'll show you exactly where the money is going — and how much we'd put back in your pocket.
            </p>
            <WaitlistInput variant="inline" source="product-final" />
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<ProductPage />);
</script>
</body>
</html>
