<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/brevitas-mark.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/brevitas-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/brevitas-mark-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/brevitas-mark-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/brevitas-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Product · Brevitas Systems</title>
<meta name="description" content="A drop-in Python SDK that optimizes inter-agent communication. Wraps your existing orchestration.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="theme-init.js" defer></script>
<link rel="stylesheet" href="/responsive.css">
</head>
<body>
<div class="noise"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="animations.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function MatrixRow({ label, items, caption }) {
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '200px 1fr',
      gap: 32,
      padding: '28px 0',
      borderBottom: '1px solid var(--line)',
      alignItems: 'start',
    }} className="matrix-row">
      <div>
        <div className="t-overline" style={{ color: 'var(--stone)' }}>{label}</div>
      </div>
      <div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '10px 22px', marginBottom: caption ? 12 : 0 }}>
          {items.map((it, i) => (
            <span key={i} className="mono" style={{
              color: 'var(--fg)',
              fontSize: 15,
              padding: '4px 10px',
              border: '1px solid var(--line)',
              borderRadius: 2,
            }}>{it}</span>
          ))}
        </div>
        {caption && <div className="t-mono" style={{ color: 'var(--stone)', marginTop: 10 }}>{caption}</div>}
      </div>
    </div>
  );
}

function ProductPage() {
  useFadeUpReveal();
  return (
    <>
      <Nav current="product" />

      {/* Hero */}
      <SectionShell>
        <h1 className="t-display fade-up in" style={{ margin: '32px 0 24px', maxWidth: 1100 }}>
          Your AI agents are expensive. We make every cost mechanism <em style={{ fontStyle: 'italic', color: 'var(--bronze)' }}>visible.</em>
        </h1>
        <p className="t-body-lg fade-up delay-1 in" style={{ maxWidth: 720, marginBottom: 48 }}>
          Two lines wrap your existing pipeline. Brevitas meters provider receipts, keeps reusable prefixes cache-stable, and reports each cost mechanism separately. Quality-affecting input reduction stays off until you enable it.
        </p>
      </SectionShell>

      {/* Composition matrix */}
      <section className="section" style={{ borderTop: '1px solid var(--line)', position: 'relative', overflow: 'hidden' }}>
        <video preload="metadata" poster="/assets/ascii-magic-3-poster.jpg" autoPlay muted loop playsInline style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: 0.55, zIndex: 0, pointerEvents: 'none' }}>
          <source src="/assets/ascii-magic-3.mp4" type="video/mp4" />
        </video>
        <div className="container" style={{ position: 'relative', zIndex: 1 }}>
          <h2 className="t-h2" style={{ marginTop: 0, marginBottom: 48, maxWidth: 900 }}>
            Your stack, unchanged.
          </h2>
          <div style={{ borderTop: '1px solid var(--line)' }}>
            <MatrixRow
              label="ORCHESTRATORS"
              items={['LangGraph', 'CrewAI', 'AutoGen', 'OpenAI Swarm', 'Custom']}
              caption="We don't require a specific orchestrator. Pass in callables; get callables back."
            />
            <MatrixRow
              label="PROVIDERS"
              items={['OpenAI', 'Anthropic', 'DeepSeek', 'Groq', 'Together', 'OpenAI-compatible /chat/completions']}
              caption="Native proxy coverage is OpenAI-compatible APIs and Anthropic Messages. Gemini receipts can be normalized for accounting, but Gemini is not wrapped or proxied."
            />
            <MatrixRow
              label="RUNTIMES"
              items={['Python 3.10+', 'any standard Python environment']}
              caption="No sidecar. No daemon. No separate infrastructure."
            />
          </div>
        </div>
      </section>

      {/* What it does, in five moves */}
      <section className="section" style={{ borderTop: '1px solid var(--line)' }}>
        <div className="container">
          <h2 className="t-h2" style={{ marginTop: 0, marginBottom: 56, maxWidth: 900 }}>
            Five mechanisms, with token reduction, cache discounts, and avoided calls kept separate.
          </h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {[
              {
                n: '01',
                h: 'Measure. Start with provider receipts.',
                b: 'Fresh input, cache reads, cache writes, output, input reduction, avoided calls, and transport bytes are recorded as different categories. Native provider discounts are not presented as Brevitas token reduction.',
                code: `receipt = normalize_usage(response.usage)`,
              },
              {
                n: '02',
                h: 'Cache. Stop paying full price for context the model already saw.',
                b: 'Repeated context can receive the provider\'s native cache discount while the provider token count stays unchanged. Brevitas preserves caller cache policy; its own billable cache writes require explicit opt-in.',
                code: `body = mark_cacheable(stable_prefix)`,
              },
              {
                n: '03',
                h: 'Reuse. Skip the call when the answer already exists.',
                b: 'Byte-identical requests can return a stored complete response instead of re-running the model. Fuzzy semantic reuse is a separate risky lever and requires explicit opt-in.',
                code: `hit = cache.lookup(request)`,
              },
              {
                n: '04',
                h: 'Reduce. Optional, quality-affecting input reduction.',
                b: 'Retrieval and LLMLingua can remove or rewrite context. They reduce provider input tokens, but they are not lossless; they fail closed behind explicit operator opt-in and per-tenant quality trips.',
                code: `ctx = prune(ctx, role="reviewer")`,
              },
              {
                n: '05',
                h: 'Route. Apply only what earns its keep.',
                b: 'A cost-aware router uses provider receipts and tenant-isolated state. Brevitas-attributable savings are shown only when an isolated paired control provides evidence.',
                code: `router.decide(call) -> "cache_only"`,
              },
            ].map((x, i) => (
              <div key={i} className="product-move fade-up" style={{
                display: 'grid',
                gridTemplateColumns: '80px 1fr 1.1fr',
                gap: 40,
                padding: '40px 0',
                borderTop: '1px solid var(--line)',
                alignItems: 'start',
              }}>
                <div className="t-mono" style={{ color: 'var(--stone)', fontSize: 14 }}>{x.n}</div>
                <div>
                  <h3 className="serif" style={{ fontSize: 32, fontWeight: 400, letterSpacing: '-0.015em', margin: '0 0 16px 0' }}>{x.h}</h3>
                  <p className="t-body" style={{ margin: 0, maxWidth: 520 }}>{x.b}</p>
                </div>
                <div>
                  <div style={{
                    fontFamily: 'JetBrains Mono, ui-monospace, monospace',
                    fontSize: 13,
                    color: 'var(--signal)',
                    background: 'var(--ink-2)',
                    border: '1px solid var(--line)',
                    borderRadius: 2,
                    padding: '14px 18px',
                    lineHeight: 1.6,
                  }}>
                    <span style={{ color: 'var(--stone)' }}># </span>
                    {x.code}
                  </div>
                </div>
              </div>
            ))}
          </div>
          <style>{`
            @media (max-width: 900px) {
              .section .grid-12 { grid-template-columns: 1fr; }
            }
          `}</style>
        </div>
      </section>

      {/* What it doesn't do */}
      <section className="section" style={{ borderTop: '1px solid var(--line)' }}>
        <div className="container" style={{ maxWidth: 820 }}>
          <h2 className="t-h2" style={{ margin: '0 0 32px' }}>
            <em style={{ fontStyle: 'italic' }}>What Brevitas is not.</em>
          </h2>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 16 }}>
            {[
              ['Not an orchestrator.', 'Use yours.'],
              ['Not blanket lossless token compression.', 'Provider caching changes price, not token count; optional compression and retrieval can affect quality.'],
              ['Not a model router.', 'See Martian or OpenRouter.'],
              ['Not an observability tool.', 'See Helicone, Langfuse, Portkey.'],
              ['Not opinionated about your agents\' prompts.', 'They\'re yours.'],
            ].map(([h, b], i) => (
              <li key={i} style={{ display: 'flex', gap: 20, paddingBottom: 16, borderBottom: '1px solid var(--line)' }}>
                <span className="t-mono" style={{ color: 'var(--stone)', flexShrink: 0, width: 24 }}>−</span>
                <div>
                  <div className="serif" style={{ fontSize: 22, fontWeight: 400, color: 'var(--fg)', marginBottom: 4 }}>{h}</div>
                  <div className="t-body" style={{ color: 'var(--stone-2)', fontSize: 15 }}>{b}</div>
                </div>
              </li>
            ))}
          </ul>
        </div>
      </section>

      {/* Final CTA */}
      <section className="section" style={{ background: 'var(--ink-2)', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)' }}>
        <div className="container">
          <div style={{ maxWidth: 820 }}>
            <h2 className="t-h1" style={{ marginTop: 0, marginBottom: 20 }}>Get your pipeline benchmarked.</h2>
            <p className="t-body-lg" style={{ marginBottom: 40, maxWidth: 680 }}>
              Tell us what you're running. We'll separate provider-native discounts from Brevitas lift using an isolated paired control.
            </p>
            <WaitlistInput variant="inline" source="product-final" />
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<ProductPage />);
</script>
</body>
</html>
