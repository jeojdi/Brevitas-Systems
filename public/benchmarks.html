<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" href="/brevitas-mark.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/brevitas-mark.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/brevitas-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<title>Benchmarks · Brevitas Systems</title>
<meta name="description" content="How Brevitas separates provider usage, cache discounts, replayed calls, transport savings, and incremental value in controlled benchmarks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<script src="theme-init.js" defer></script>
<link rel="stylesheet" href="/responsive.css">
</head>
<body>
<div class="noise"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0Jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
const MECHANISMS = [
  ['Provider input tokens avoided', 'Only counted when a quality-affecting reduction actually sends fewer input tokens.'],
  ['Native cache discount', 'The provider receives the same prompt tokens but bills cached reads at its discounted rate.'],
  ['Model calls avoided', 'Exact response replay can skip a provider call; it is reported separately from token reduction.'],
  ['Transport bytes avoided', 'CID and delta deduplication can reduce network payload size without changing provider tokens.'],
  ['Brevitas lift versus control', 'Incremental dollar value is reported only when an isolated, paired control run exists.'],
];

const REQUIREMENTS = [
  ['Paired, isolated controls', 'Control and treatment use separate cache namespaces so one arm cannot warm the other.'],
  ['Randomized order', 'Arm order changes across repeated trials to reduce provider and timing bias.'],
  ['Fixed transcripts', 'Both arms receive the same prompts, models, parameters, and output limits.'],
  ['Cold and warm results', 'Native cache effects are shown separately instead of being relabeled as Brevitas token reduction.'],
  ['Task-level outcomes', 'Reports include per-example behavior and confidence intervals, not only aggregate averages.'],
];

function BenchmarksPage() {
  useFadeUpReveal();
  return (
    <>
      <Nav current="benchmarks" />

      <section className="section" style={{ position: 'relative', overflow: 'hidden' }}>
        <video preload="metadata" poster="/assets/ascii-magic-5-poster.jpg" autoPlay muted loop playsInline style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: 0.55, zIndex: 0, pointerEvents: 'none' }}>
          <source src="/assets/ascii-magic-5.mp4" type="video/mp4" />
        </video>
        <div className="container" style={{ position: 'relative', zIndex: 1 }}>
          <Overline dot>BENCHMARK METHODOLOGY</Overline>
          <h1 className="t-display fade-up in" style={{ margin: '32px 0 24px', maxWidth: 1100 }}>Evidence before percentages.</h1>
          <p className="t-body-lg fade-up delay-1 in" style={{ maxWidth: 760, marginBottom: 48 }}>
            Brevitas reports each savings mechanism separately. We do not treat a provider's native cache discount as tokens removed, and we do not claim incremental value without a paired control.
          </p>
        </div>
      </section>

      <section className="section" style={{ borderTop: '1px solid var(--line)', paddingTop: 40 }}>
        <div className="container">
          <div className="benchmark-headlines" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', border: '1px solid var(--line)' }}>
            {MECHANISMS.map(([label, explanation], i) => (
              <div key={label} style={{ padding: '36px 30px', borderRight: i < MECHANISMS.length - 1 ? '1px solid var(--line)' : 'none', background: i === 4 ? 'var(--ink-2)' : 'transparent' }}>
                <div className="t-mono" style={{ color: i === 4 ? 'var(--bronze)' : 'var(--stone-2)', fontSize: 11, marginBottom: 16 }}>{label.toUpperCase()}</div>
                <div className="t-body" style={{ color: 'var(--stone)', fontSize: 14 }}>{explanation}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="section" style={{ borderTop: '1px solid var(--line)' }}>
        <div className="container" style={{ maxWidth: 820 }}>
          <Overline>VALID ATTRIBUTION</Overline>
          <h2 className="t-h2" style={{ margin: '24px 0 28px' }}><em style={{ fontStyle: 'italic' }}>What a publishable run requires.</em></h2>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 18 }}>
            {REQUIREMENTS.map(([heading, body], i) => (
              <li key={heading} style={{ display: 'flex', gap: 16, paddingBottom: 16, borderBottom: '1px solid var(--line)' }}>
                <span className="t-mono" style={{ color: 'var(--bronze)', flexShrink: 0, width: 24 }}>0{i + 1}</span>
                <div>
                  <div className="serif" style={{ fontSize: 20, fontWeight: 400, marginBottom: 6 }}>{heading}</div>
                  <div className="t-body" style={{ color: 'var(--stone-2)', fontSize: 14 }}>{body}</div>
                </div>
              </li>
            ))}
          </ul>
        </div>
      </section>

      <section className="section section--tight" style={{ background: 'var(--ink-2)', borderTop: '1px solid var(--line)', borderBottom: '1px solid var(--line)' }}>
        <div className="container">
          <div style={{ maxWidth: 720 }}>
            <Overline dot>RUN IT YOURSELF</Overline>
            <h2 className="t-h2" style={{ marginTop: 20, marginBottom: 16 }}>Validate it on your workload.</h2>
            <p className="t-body-lg" style={{ marginBottom: 32 }}>
              Run the paired harness against your own fixed transcripts. Until a controlled result exists, the dashboard leaves Brevitas-incremental savings blank.
            </p>
            <WaitlistInput source="benchmarks-final" />
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<BenchmarksPage />);
</script>
</body>
</html>
