<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/brevitas-mark.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/brevitas-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/brevitas-mark-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/brevitas-mark-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/brevitas-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Evaluating optional context compression · Brevitas Systems</title>
<meta name="description" content="How Brevitas evaluates optional, quality-affecting context compression with paired controls and per-task outcomes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/theme-init.js" defer></script>
<link rel="stylesheet" href="/responsive.css">
</head>
<body>
<div class="noise"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel" src="/components.jsx"></script>

<script type="text/babel">
function PostPage() {
  useFadeUpReveal();
  return (
    <>
      <Nav current="blog" />

      <section className="section" style={{ paddingBottom: 0 }}>
        <div className="container" style={{ maxWidth: 760 }}>
          <div className="t-mono fade-up in" style={{ color: 'var(--bronze)', fontSize: 11, marginBottom: 28 }}>
            METHOD · MARCH 2026
          </div>
          <h1 className="serif fade-up in" style={{ fontSize: 'clamp(36px, 5.5vw, 64px)', fontWeight: 400, letterSpacing: '-0.025em', lineHeight: 1.06, margin: '0 0 28px' }}>
            Evaluating optional context compression.
          </h1>
          <p className="t-body-lg fade-up delay-1 in" style={{ maxWidth: 640, marginBottom: 40, color: 'var(--stone-2)' }}>
            Compression can reduce provider input tokens, but it can also change model behavior. That is why it is opt-in, fail-closed, and measured separately from content-preserving cache optimization.
          </p>
          <div style={{ display: 'flex', alignItems: 'center', gap: 20, paddingBottom: 48, borderBottom: '1px solid var(--line)' }}>
            <span className="t-mono" style={{ color: 'var(--stone)', fontSize: 11 }}>Mar 28, 2026</span>
            <span className="t-mono" style={{ color: 'var(--line)' }}>·</span>
            <span className="t-mono" style={{ color: 'var(--stone)', fontSize: 11 }}>11 min read</span>
            <span className="t-mono" style={{ color: 'var(--line)' }}>·</span>
            <span className="t-mono" style={{ fontSize: 10, color: 'var(--bronze)', padding: '3px 8px', border: '1px solid var(--bronze)', borderRadius: 2, letterSpacing: '0.1em' }}>METHOD</span>
          </div>
        </div>
      </section>

      <article>
        <section className="section" style={{ paddingTop: 56, paddingBottom: 0 }}>
          <div className="container" style={{ maxWidth: 760 }}>
            <p className="t-body-lg fade-up" style={{ marginBottom: 24 }}>
              Most agent messages have two layers. The first is the task-relevant core: the actual code, the actual finding, the actual decision. The second is the recapitulation: the narration of how you got there. "Based on the analysis above, I'll now implement…" "As you can see from the output, the function correctly handles…" "Having reviewed the requirements, my design will…"
            </p>
            <p className="t-body fade-up" style={{ marginBottom: 24 }}>
              Compression attempts to target recapitulation rather than task-relevant content. That distinction is probabilistic, not a guarantee: removing or rewriting any context can change the next model call.
            </p>
            <p className="t-body fade-up" style={{ marginBottom: 24 }}>
              The harder question is how to tell them apart reliably at scale. A relevance model that occasionally removes the wrong thing isn't useful — you'd rather pay the full token cost than degrade your pipeline quality unpredictably.
            </p>
          </div>
        </section>

        <section style={{ padding: '56px 0' }}>
          <div className="container" style={{ maxWidth: 760 }}>
            <blockquote style={{ borderLeft: '2px solid var(--bronze)', paddingLeft: 28, margin: 0 }}>
              <p className="serif fade-up" style={{ fontSize: 'clamp(24px, 3.5vw, 34px)', fontWeight: 300, fontStyle: 'italic', letterSpacing: '-0.015em', lineHeight: 1.28, color: 'var(--fg)', margin: 0 }}>
                "Compression is useful only when the measured tradeoff is acceptable for the workload in front of it."
              </p>
            </blockquote>
          </div>
        </section>

        <section className="section" style={{ paddingTop: 0, paddingBottom: 0 }}>
          <div className="container" style={{ maxWidth: 760 }}>
            <h2 className="serif fade-up" style={{ fontSize: 'clamp(28px, 3.8vw, 40px)', fontWeight: 400, letterSpacing: '-0.02em', marginBottom: 28 }}>
              The relevance model.
            </h2>
            <p className="t-body fade-up" style={{ marginBottom: 24 }}>
              A lightweight relevance scorer assigns paragraph-level chunks a score based on how likely they are to influence the next agent's decision. Higher-scoring chunks such as code, decisions, and findings are retained; lower-scoring chunks may be removed or summarized when compression is explicitly enabled.
            </p>
            <p className="t-body fade-up" style={{ marginBottom: 24 }}>
              Evaluation compares compressed and uncompressed requests using fixed transcripts, identical model settings, isolated cache namespaces, randomized arm order, and repeated trials. Outcomes are reviewed per task because an aggregate average can hide individual regressions.
            </p>
            <p className="t-body fade-up" style={{ marginBottom: 24 }}>
              The relevant signal is downstream task behavior, not whether a summary reads well. A fluent summary can still omit a detail that matters to the next call.
            </p>
          </div>
        </section>

        <section className="section" style={{ paddingTop: 56, paddingBottom: 0 }}>
          <div className="container" style={{ maxWidth: 760 }}>
            <h2 className="serif fade-up" style={{ fontSize: 'clamp(28px, 3.8vw, 40px)', fontWeight: 400, letterSpacing: '-0.02em', marginBottom: 28 }}>
              How we measure the tradeoff.
            </h2>
            <p className="t-body fade-up" style={{ marginBottom: 24 }}>
              Each trial includes a full-context control and a compression treatment. We compare final task outcomes, provider input tokens, cost, and latency while keeping prompts and generation settings fixed.
            </p>

            <div className="fade-up" style={{ border: '1px solid var(--line)', borderRadius: 4, overflow: 'hidden', marginBottom: 32 }}>
              <div className="t-mono" style={{ padding: '10px 20px', borderBottom: '1px solid var(--line)', color: 'var(--stone-2)', fontSize: 11, background: 'var(--ink-2)' }}>
                REQUIRED REPORT FIELDS
              </div>
              {[
                { metric: 'Task outcome', value: 'per item', note: 'control and treatment behavior' },
                { metric: 'Provider input', value: 'tokens', note: 'actual tokens received by the provider' },
                { metric: 'Provider cost', value: 'USD', note: 'including cache reads and writes' },
                { metric: 'Uncertainty', value: '95% CI', note: 'across repeated randomized trials' },
              ].map(r => (
                <div key={r.metric} style={{ padding: '14px 20px', borderBottom: '1px solid var(--line)', display: 'grid', gridTemplateColumns: '1fr 80px 1fr', gap: 16, alignItems: 'center' }}>
                  <span className="t-mono" style={{ fontSize: 11, color: 'var(--stone-2)' }}>{r.metric}</span>
                  <span className="t-mono" style={{ fontSize: 14, color: 'var(--signal)' }}>{r.value}</span>
                  <span className="t-mono" style={{ fontSize: 10, color: 'var(--stone)' }}>{r.note}</span>
                </div>
              ))}
            </div>

            <p className="t-body fade-up" style={{ marginBottom: 24 }}>
              A result is attributable to Brevitas only when the control and treatment are isolated. Provider-native cache discounts are reported separately from provider input tokens avoided, and a response replay is reported as a model call avoided.
            </p>
            <p className="t-body fade-up">
              There is no blanket safe compression rate. The acceptable tradeoff depends on the workload, and risky reduction levers remain disabled until an operator opts in after reviewing controlled evidence.
            </p>
          </div>
        </section>

        <section className="section" style={{ paddingTop: 56 }}>
          <div className="container" style={{ maxWidth: 760 }}>
            <p className="t-body-lg fade-up" style={{ marginBottom: 0 }}>
              The paired benchmark harness is available to design partners. If you want to evaluate it on your own fixed transcripts, <a href="/login" className="link">sign up</a> and reach out.
            </p>
          </div>
        </section>
      </article>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<PostPage />);
</script>
</body>
</html>
