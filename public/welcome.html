<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/brevitas-mark.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/brevitas-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/brevitas-mark-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/brevitas-mark-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/brevitas-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome · Brevitas Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: var(--ink);
  color: var(--bone);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter Tight', sans-serif;
}

.bg-video {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.55;
  z-index: 0;
  pointer-events: none;
}

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 820px;
  padding: 40px 24px;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
  justify-content: center;
  margin-bottom: 44px;
  text-decoration: none;
}
.logo-name {
  font-family: 'Newsreader', serif;
  font-size: 1.8rem;
  font-weight: 300;
  color: var(--bone);
  letter-spacing: -0.01em;
}
.logo-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
  color: var(--stone);
}

.card {
  background: rgba(6, 7, 11, 0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(196, 206, 229, 0.15);
  border-radius: 20px;
  padding: 56px 72px 52px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
}

.beta-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--bronze);
  border: 1px solid rgba(142, 166, 255, 0.35);
  border-radius: 3px;
  padding: 3px 9px;
  margin-bottom: 28px;
}

.heading {
  font-family: 'Newsreader', serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 300;
  letter-spacing: -0.025em;
  line-height: 1.08;
  color: var(--bone);
  margin-bottom: 20px;
}

.body {
  font-size: 15px;
  color: var(--stone-2);
  line-height: 1.65;
  max-width: 560px;
  margin-bottom: 16px;
}

.divider {
  width: 100%;
  border: none;
  border-top: 1px solid rgba(196, 206, 229, 0.1);
  margin: 32px 0;
}

.detail-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 12px;
}
.detail-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--stone);
  flex-shrink: 0;
  width: 80px;
}
.detail-value {
  font-size: 13px;
  color: var(--stone-2);
  line-height: 1.5;
}
.detail-value a {
  color: var(--bronze);
  text-decoration: none;
}
.detail-value a:hover { opacity: 0.8; }

.cta-row {
  display: flex;
  gap: 12px;
  margin-top: 36px;
  flex-wrap: wrap;
}

.btn-primary {
  padding: 13px 28px;
  background: var(--bronze);
  border: none;
  border-radius: 10px;
  color: var(--ink);
  font-family: 'Inter Tight', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 100ms;
}
.btn-primary:hover { opacity: 0.88; }

.btn-ghost {
  padding: 13px 28px;
  background: transparent;
  border: 1px solid rgba(196, 206, 229, 0.18);
  border-radius: 10px;
  color: var(--stone-2);
  font-family: 'Inter Tight', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 100ms, color 100ms;
}
.btn-ghost:hover { border-color: rgba(196, 206, 229, 0.32); color: var(--bone); }

.back-link {
  display: block;
  text-align: center;
  margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--stone);
  text-decoration: none;
  transition: color 80ms;
}
.back-link:hover { color: var(--stone-2); }
</style>
<link rel="stylesheet" href="/responsive.css">
</head>
<body>

<video preload="metadata" poster="/assets/ascii-magic-4-poster.jpg" class="bg-video" autoplay muted loop playsinline>
  <source src="/assets/ascii-magic-4.mp4" type="video/mp4">
</video>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect } = React;

function WelcomePage() {
  const params = new URLSearchParams(window.location.search);
  const email  = params.get('email') || '';
  const name   = email ? email.split('@')[0].replace(/[._\-+]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).split(' ')[0] : '';

  return (
    <div className="wrap">
      <a href="/" className="logo">
        <span className="logo-name">Brevitas</span>
        <span className="logo-tag">Systems</span>
      </a>

      <div className="card">
        <div className="beta-pill">EARLY ACCESS · BETA</div>

        <h1 className="heading">
          {name ? `Hello, ${name}.` : 'Welcome aboard.'}
        </h1>

        <p className="body">
          Thanks for signing up. Check your email to confirm your address, then sign in and you're good to go.
        </p>

        <p className="body" style={{ marginBottom: 0 }}>
          Brevitas is in private beta right now — a small group of teams running real agent pipelines in production. You're getting in early, which means you'll see things that are still rough. We want to hear about them.
        </p>

        <hr className="divider" />

        <div className="detail-row">
          <span className="detail-label">STATUS</span>
          <span className="detail-value">Private beta — active development</span>
        </div>
        <div className="detail-row">
          <span className="detail-label">CONTACT</span>
          <span className="detail-value"><a href="mailto:info@brevitassystems.com">info@brevitassystems.com</a></span>
        </div>
        <div className="detail-row">
          <span className="detail-label">BUGS</span>
          <span className="detail-value">Email us directly — we read everything</span>
        </div>
        {email && (
          <div className="detail-row">
            <span className="detail-label">SIGNED UP</span>
            <span className="detail-value">{email}</span>
          </div>
        )}

        <div className="cta-row">
          <a href="/login" className="btn-primary">Sign in →</a>
          <a href="/" className="btn-ghost">Back to homepage</a>
        </div>
      </div>

      <a href="/" className="back-link">← brevitassystems.com</a>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<WelcomePage />);
</script>
</body>
</html>
