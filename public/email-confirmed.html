<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Email confirmed · Brevitas Systems</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #eef0f7; color: #0d1530; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    main { width: min(100%, 480px); padding: 48px; text-align: center; background: #fff; border: 1px solid #e2e4f0; border-radius: 24px; box-shadow: 0 18px 60px rgba(13, 21, 48, .08); }
    .brand { width: 180px; height: auto; margin-bottom: 36px; }
    .check { width: 56px; height: 56px; display: grid; place-items: center; margin: 0 auto 24px; border-radius: 50%; background: #e4f4ef; color: #2d8a6e; font-size: 26px; }
    h1 { margin: 0; font: 40px/1.1 Georgia, serif; font-weight: 400; }
    p { margin: 16px 0 30px; color: #687092; line-height: 1.6; }
    a { display: block; padding: 14px 20px; border-radius: 12px; background: #4f5fc4; color: #fff; text-decoration: none; font-weight: 600; }
    a:hover { opacity: .9; }
    @media (prefers-color-scheme: dark) {
      body { background: #0c0c0c; color: #eee; }
      main { background: #141414; border-color: #242424; box-shadow: none; }
      p { color: #aaa; }
    }
  </style>
</head>
<body>
  <main>
    <img class="brand" src="/assets/b-logo-tight.png" alt="Brevitas">
    <div class="check" aria-hidden="true">✓</div>
    <h1 id="title">Your email is confirmed.</h1>
    <p id="message">Your account is ready. Sign in to open your token tracking dashboard.</p>
    <a href="/login">Continue to sign in →</a>
  </main>
  <script>
    const params = new URLSearchParams(location.search || location.hash.slice(1));
    if (params.get('error') || params.get('error_description')) {
      document.querySelector('.check').textContent = '!';
      document.querySelector('#title').textContent = 'That link did not work.';
      document.querySelector('#message').textContent = params.get('error_description') || 'The confirmation link may have expired. Sign in to request another.';
    }
  </script>
</body>
</html>
