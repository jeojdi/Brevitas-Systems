<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Brevitas Systems</title>
<meta name="description" content="Sign in to Brevitas Systems.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: var(--ink);
  color: var(--bone);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter Tight', sans-serif;
}

.bg-video {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.55;
  z-index: 0;
  pointer-events: none;
}

.auth-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 820px;
  padding: 40px 24px;
}

.auth-logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
  justify-content: center;
  margin-bottom: 44px;
  text-decoration: none;
}
.auth-logo-name {
  font-family: 'Newsreader', serif;
  font-size: 1.8rem;
  font-weight: 300;
  color: var(--bone);
  letter-spacing: -0.01em;
}
.auth-logo-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
  color: var(--stone);
}

.auth-card {
  background: rgba(6, 7, 11, 0.55);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(196, 206, 229, 0.15);
  border-radius: 20px;
  padding: 44px 72px 40px;
  min-height: 480px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.auth-heading {
  font-family: 'Newsreader', serif;
  font-size: 36px;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--bone);
  margin-bottom: 8px;
}
.auth-sub {
  font-size: 14px;
  color: var(--stone);
  margin-bottom: 36px;
  line-height: 1.4;
}

.auth-notice {
  padding: 11px 14px;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.5;
  margin-bottom: 20px;
}
.auth-notice.ok  { background: rgba(141,216,198,0.08); border: 1px solid rgba(141,216,198,0.2); color: var(--signal); }
.auth-notice.err { background: rgba(201,128,120,0.08); border: 1px solid rgba(201,128,120,0.2); color: var(--oxblood); }

.auth-field { margin-bottom: 22px; }
.auth-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--stone-2);
  margin-bottom: 8px;
}
.auth-input {
  width: 100%;
  padding: 13px 16px;
  background: rgba(196,206,229,0.05);
  border: 1px solid rgba(196,206,229,0.12);
  border-radius: 10px;
  color: var(--bone);
  font-family: 'Inter Tight', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 100ms;
}
.auth-input::placeholder { color: var(--stone); }
.auth-input:focus { border-color: rgba(142,166,255,0.45); background: rgba(196,206,229,0.07); }

.auth-btn {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  background: var(--bronze);
  border: none;
  border-radius: 10px;
  color: var(--ink);
  font-family: 'Inter Tight', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 100ms;
}
.auth-btn:hover { opacity: 0.88; }
.auth-btn:disabled { opacity: 0.4; cursor: default; }

.auth-divider {
  border: none;
  border-top: 1px solid rgba(196,206,229,0.1);
  margin: 28px 0 22px;
}

.auth-links {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}
.auth-link {
  font-size: 13px;
  color: var(--stone);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: color 80ms;
}
.auth-link:hover { color: var(--stone-2); }
.auth-link.accent { color: var(--bronze); }
.auth-link.accent:hover { opacity: 0.8; }

.back-link {
  display: block;
  text-align: center;
  margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: var(--stone);
  text-decoration: none;
  transition: color 80ms;
}
.back-link:hover { color: var(--stone-2); }
</style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="/assets/ascii-magic-4.mp4" type="video/mp4">
</video>

<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://rdgndwwgsnhdnmrkqqam.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Ml4eC2PvnkA3tgWWeN6kxQ_zsnQenl0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function AuthPage() {
  const [mode, setMode]         = useState('signin');
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading]   = useState(false);
  const [notice, setNotice]     = useState(null);

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.replace('/dashboard');
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      if (session) window.location.replace('/dashboard');
    });
    return () => subscription.unsubscribe();
  }, []);

  function switchMode(m) { setEmail(''); setPassword(''); setNotice(null); setMode(m); }

  async function submit(e) {
    e.preventDefault();
    setLoading(true);
    setNotice(null);
    try {
      if (mode === 'signin') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else if (mode === 'signup') {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        window.location.replace('/welcome?email=' + encodeURIComponent(email));
      } else if (mode === 'reset') {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/dashboard',
        });
        if (error) throw error;
        setNotice({ type: 'ok', msg: 'Reset link sent — check your email.' });
        switchMode('signin');
      }
    } catch (err) {
      setNotice({ type: 'err', msg: err.message });
    } finally {
      setLoading(false);
    }
  }

  const headings = {
    signin: ['Sign in',        'Welcome back.'],
    signup: ['Create account', 'Get started in seconds.'],
    reset:  ['Reset password', "We'll send a link to your email."],
  };
  const [heading, sub] = headings[mode];

  return (
    <div className="auth-wrap">
      <a href="/" className="auth-logo">
        <span className="auth-logo-name">Brevitas</span>
        <span className="auth-logo-tag">Systems</span>
      </a>

      <div className="auth-card">
        <div className="auth-heading">{heading}</div>
        <div className="auth-sub">{sub}</div>

        {notice && (
          <div className={`auth-notice ${notice.type}`}>{notice.msg}</div>
        )}

        <form onSubmit={submit}>
          <div className="auth-field">
            <label className="auth-label">Email</label>
            <input
              className="auth-input"
              type="email" required autoComplete="email"
              placeholder="you@company.com"
              value={email}
              onChange={e => setEmail(e.target.value)}
            />
          </div>

          {mode !== 'reset' && (
            <div className="auth-field">
              <label className="auth-label">Password</label>
              <input
                className="auth-input"
                type="password" required minLength={6}
                placeholder="••••••••"
                autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
                value={password}
                onChange={e => setPassword(e.target.value)}
              />
            </div>
          )}

          <button className="auth-btn" type="submit" disabled={loading}>
            {loading ? 'Please wait…'
              : mode === 'signin' ? 'Sign in'
              : mode === 'signup' ? 'Create account'
              : 'Send reset link'}
          </button>
        </form>

        <hr className="auth-divider" />

        <div className="auth-links">
          {mode === 'signin' && <>
            <button className="auth-link accent" onClick={() => switchMode('signup')}>
              No account? Sign up →
            </button>
            <button className="auth-link" onClick={() => switchMode('reset')}>
              Forgot password?
            </button>
          </>}
          {(mode === 'signup' || mode === 'reset') && (
            <button className="auth-link" onClick={() => switchMode('signin')}>
              ← Back to sign in
            </button>
          )}
        </div>
      </div>

      <a href="/" className="back-link">← brevitassystems.com</a>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<AuthPage />);
</script>
</body>
</html>
