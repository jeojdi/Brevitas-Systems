<script type="text/babel">
const { useState } = React;

function ParticlesBackground() {
  const particles = Array.from({ length: 15 }, (_, i) => ({
    id: i,
    left: Math.random() * 100 + '%',
    delay: Math.random() * 20 + 's',
    duration: 15 + Math.random() * 10 + 's',
  }));

  return (
    <div className="particles">
      {particles.map(p => (
        <div
          key={p.id}
          className="particle"
          style={{
            left: p.left,
            animationDelay: p.delay,
            animationDuration: p.duration,
          }}
        />
      ))}
    </div>
  );
}

function WaitlistForm() {

    email: '', name: '', company: '', role: '',
    pipeline_shape: '', monthly_spend: '', orchestrator: '',
    notes: '', design_partner: false,

  const submit = (e) => {
    e.preventDefault();
    setState('submitting');
    setTimeout(() => {
      setState('success');
      try {
        const existing = JSON.parse(localStorage.getItem('brevitas_waitlist') || '[]');
        existing.push({ ...form, t: Date.now() });
        localStorage.setItem('brevitas_waitlist', JSON.stringify(existing));

    }, 900);

    return (

          <span>REQUEST RECEIVED</span>

          e.currentTarget.style.boxShadow = '0 8px 24px rgba(212, 169, 109, 0.15)';

        onMouseLeave={(e) => {
          e.currentTarget.style.background = 'linear-gradient(135deg, rgba(212, 169, 109, 0.04) 0%, rgba(22, 27, 23, 0.6) 100%)';
          e.currentTarget.style.borderColor = 'rgba(212, 169, 109, 0.2)';
          e.currentTarget.style.transform = 'translateY(0)';
          e.currentTarget.style.boxShadow = 'none';
        }}
      >
        <input
          type="checkbox"
          checked={form.design_partner}
          onChange={e => update('design_partner', e.target.checked)}
          style={{
            marginTop: '3px',
            width: '20px',
            height: '20px',
            accentColor: '#d4a96d',
            cursor: 'pointer'
          }}
        />
        <span>
          <span className="t-mono" style={{ display: 'block', color: '#d4a96d', marginBottom: 4, fontSize: '11px', letterSpacing: '0.08em' }}>DESIGN PARTNER</span>
          <span className="t-body" style={{ fontSize: 15, color: '#f5f1e8' }}>
            I'd like to be considered as a design partner — direct access to the team, custom benchmarks on my pipeline, and early SDK builds.
          </span>
        </span>
      </label>

      <div style={{ display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
        <button
          type="submit"
          disabled={state === 'submitting'}
          className="btn-primary-enhanced"
          style={{
            minWidth: 200,
            padding: '16px 32px',
            background: state === 'submitting' ?
              'linear-gradient(135deg, #d4a96d 0%, #b89755 100%)' :
              'linear-gradient(135deg, #d4a96d 0%, #b89755 100%)',
            border: '1px solid rgba(212, 169, 109, 0.3)',
            borderRadius: '8px',
            color: '#0a0d0a',
            fontFamily: "'Inter Tight', sans-serif",
            fontWeight: 600,
            fontSize: '15px',
            letterSpacing: '0.02em',
            cursor: state === 'submitting' ? 'not-allowed' : 'pointer',
            transition: 'all 300ms cubic-bezier(0.16, 1, 0.3, 1)',
            boxShadow: '0 4px 12px rgba(212, 169, 109, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2)',
            display: 'inline-flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '8px',
            opacity: state === 'submitting' ? 0.7 : 1
          }}
          onMouseEnter={(e) => {
            if (state !== 'submitting') {
              e.target.style.background = 'linear-gradient(135deg, #e4b85b 0%, #d4a96d 100%)';
              e.target.style.transform = 'translateY(-2px)';
              e.target.style.boxShadow = '0 8px 24px rgba(212, 169, 109, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3)';
            }
          }}
          onMouseLeave={(e) => {
            if (state !== 'submitting') {
              e.target.style.background = 'linear-gradient(135deg, #d4a96d 0%, #b89755 100%)';
              e.target.style.transform = 'translateY(0)';
              e.target.style.boxShadow = '0 4px 12px rgba(212, 169, 109, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2)';
            }
          }}
        >
          {state === 'submitting' ? (
            <>
              <span className="spinner"></span>
              <span>Sending...</span>
            </>
          ) : (
            <>Request access <span style={{ marginLeft: 4 }}>→</span></>
          )}
        </button>
        <span className="t-mono" style={{ color: 'var(--stone)', fontSize: 12 }}>
          No spam. We respond to every submission.
        </span>
      </div>
    </form>
    </div>
  );
}

function Field({ label, hint, required, children }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <span className="t-mono" style={{ color: 'var(--stone-2)', fontSize: 11, display: 'flex', alignItems: 'center', gap: 8 }}>
        {label.toUpperCase()} {required && <span style={{ color: 'var(--bronze)' }}>*</span>}
      </span>
      {children}
      {hint && <span className="t-body" style={{ fontSize: 13, color: 'var(--stone)' }}>{hint}</span>}
    </label>
  );
}
