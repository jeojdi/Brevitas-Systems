<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes · Brevitas Systems</title>
<meta name="description" content="Engineering notes from the Brevitas team — coming soon.">
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div class="noise"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
function BlogComingSoon() {
  return (
    <>
      <Nav current="" />

      <section style={{
        minHeight: 'calc(100vh - 80px)',
        display: 'flex',
        alignItems: 'center',
        padding: 'clamp(40px, 8vh, 120px) 0',
      }}>
        <div className="container">
          <div style={{ maxWidth: 720 }}>
            <div className="t-mono" style={{ color: 'var(--bronze)', marginBottom: 24, fontSize: 13 }}>
              NOTES · COMING SOON
            </div>
            <h1 className="serif" style={{
              fontSize: 'clamp(56px, 9vw, 120px)',
              fontWeight: 300,
              letterSpacing: '-0.03em',
              lineHeight: 1,
              margin: '0 0 24px 0',
            }}>
              Notes are <em style={{ fontStyle: 'italic', color: 'var(--bronze)' }}>on the way</em>.
            </h1>
            <p className="t-body-lg" style={{ marginBottom: 40, maxWidth: 560 }}>
              Engineering notes from the Brevitas team on multi-agent inference economics, compression, and pipeline design. We're writing them now.
            </p>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 16, marginBottom: 56 }}>
              <a href="/waitlist" className="btn btn-primary">Get notified</a>
              <a href="/" className="btn btn-ghost underline">Back to home</a>
            </div>

            <div style={{
              padding: '20px 24px',
              border: '1px solid var(--line)',
              background: 'var(--ink-2)',
              borderLeft: '2px solid var(--bronze)',
              maxWidth: 560,
              fontFamily: 'JetBrains Mono, monospace',
              fontSize: 12,
              color: 'var(--stone-2)',
            }}>
              <div style={{ color: 'var(--stone)', marginBottom: 6 }}># status</div>
              <div>posts.draft = 4</div>
              <div style={{ color: 'var(--bronze)' }}>posts.published = 0</div>
              <div>→ <span style={{ color: 'var(--signal)' }}>first note shipping soon</span></div>
            </div>
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<BlogComingSoon />);
</script>
</body>
</html>
