name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: |
          package-lock.json
          dashboard/package-lock.json
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          api/requirements.txt
    - name: Install root dependencies
      run: npm ci
    - name: Test, lint, and build root app
      env:
        API_URL: http://localhost:8000
        NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      run: |
        npm test
        npm run lint
        npm run build
    - name: Install and test dashboard
      run: |
        npm ci --prefix dashboard
        npm test --prefix dashboard
    - name: Build dashboard outside public/
      env:
        VITE_SUPABASE_URL: https://example.supabase.co
        VITE_SUPABASE_ANON_KEY: ci-placeholder
      run: npm run build --prefix dashboard -- --outDir /tmp/brevitas-dashboard-build --emptyOutDir
    - name: Install backend dependencies
      run: python -m pip install -e . -r api/requirements.txt pytest
    - name: Test active backend suites
      run: >-
        pytest -q tests unit-tests
        --ignore=unit-tests/test_real_llm_e2e.py
        --ignore=unit-tests/test_structural_real_llm.py
        -k 'not real_encoder_scores_identical_text_as_1'

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: |
        npm audit --production --json > npm-audit.json || true
        echo "NPM Audit Results:"
        cat npm-audit.json | jq '.' || cat npm-audit.json
      continue-on-error: true

    - name: Check for secrets with TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.pull_request.base.sha || github.event.before || github.event.repository.default_branch }}
        head: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Run Semgrep security scan
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/owasp-top-ten
          p/javascript
          p/react
          p/nodejs

    - name: Check for SQL injection patterns
      run: |
        echo "Checking for SQL injection vulnerabilities..."
        if grep -r --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" \
           -E "(query|execute|exec)\(.*\+.*\)" .; then
          echo "Warning: Potential SQL injection patterns found"
        fi

    - name: Check for XSS vulnerabilities
      run: |
        echo "Checking for XSS vulnerabilities..."
        if grep -r --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" \
           -E "dangerouslySetInnerHTML|innerHTML" .; then
          echo "Warning: Potential XSS vulnerabilities found"
        fi

    - name: Check for exposed environment variables
      run: |
        echo "Checking for exposed environment variables..."
        if grep -r --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" \
           -E "process\.env\.[A-Z_]+.*['\"]" . | grep -v "NEXT_PUBLIC_"; then
          echo "Warning: Non-public environment variables may be exposed"
        fi

    - name: Dependency vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Display Trivy results
      run: |
        echo "Running Trivy scan for display..."
        docker run --rm -v "$PWD":/src aquasec/trivy fs /src --severity CRITICAL,HIGH,MEDIUM || true
      continue-on-error: true

    - name: Upload security results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: |
          npm-audit.json
          trivy-results.sarif
        if-no-files-found: warn
