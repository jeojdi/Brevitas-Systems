name: Release security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read

concurrency:
  group: release-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Reproducible build and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.17.1'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11.13'
          cache: pip
          cache-dependency-path: scripts/ci/python-test.lock
      - name: Install locked JavaScript dependencies
        run: |
          npm ci --ignore-scripts
          npm ci --ignore-scripts --prefix dashboard
      - name: Install hashed Python dependencies
        run: python -m pip install --require-hashes -r scripts/ci/python-test.lock
      - name: Test, lint, and build root app
        env:
          API_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
        run: |
          npm test
          npm run lint
          npm run build
      - name: Test and build dashboard
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
        run: |
          npm test --prefix dashboard
          npm run build --prefix dashboard -- --outDir /tmp/brevitas-dashboard-build --emptyOutDir
      - name: Test backend
        run: >-
          python -m pytest -q tests unit-tests token_efficiency_model/lossless/tests
          --ignore=unit-tests/test_real_llm_e2e.py
          --ignore=unit-tests/test_structural_real_llm.py
          -k 'not real_encoder_scores_identical_text_as_1'
      - name: Record unsigned CI test claim
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          github.repository == 'jeojdi/Brevitas-Systems' &&
          github.event.repository.fork == false
        run: node scripts/ci/write-unsigned-ci-claim.mjs --output unsigned-ci-test-claim.json
      - name: Upload unsigned CI test claim
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          github.repository == 'jeojdi/Brevitas-Systems' &&
          github.event.repository.fork == false
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unsigned-ci-test-claim-${{ github.sha }}
          path: unsigned-ci-test-claim.json
          if-no-files-found: error
          retention-days: 30

  dependency-audit:
    name: Blocking dependency audits (high/critical)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.17.1'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11.13'
          cache: pip
          cache-dependency-path: scripts/ci/python-audit.lock
      - name: Audit root npm lock
        run: npm audit --audit-level=high
      - name: Audit dashboard npm lock
        run: npm audit --prefix dashboard --audit-level=high
      - name: Install hashed Python audit tooling
        run: python -m pip install --require-hashes -r scripts/ci/python-audit.lock
      - name: Audit hashed Python runtime locks
        run: |
          pip-audit --strict --require-hashes --disable-pip -r scripts/ci/python-runtime.lock
          pip-audit --strict --require-hashes --disable-pip --vulnerability-service osv -r scripts/ci/python-compressor.lock

  sast:
    name: Blocking SAST (Semgrep ERROR)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11.13'
          cache: pip
          cache-dependency-path: scripts/ci/python-sast.lock
      - name: Install hashed SAST tooling
        run: python -m pip install --require-hashes -r scripts/ci/python-sast.lock
      - name: Run repository SAST policy
        run: semgrep scan --config .github/semgrep.yml --severity ERROR --error --metrics off

  secret-scan:
    name: Blocking verified-secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out complete history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan pull-request commit range
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@e88e7d019eb84ca64f6b768c82eb6bf1a6271401 # v3.90.9
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
          version: 3.90.9@sha256:b8541abacdcf6c6a728bf1c9d868cacacb4addec8fbb6d258dc5699b74fad5c5
      - name: Scan push commit range
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@e88e7d019eb84ca64f6b768c82eb6bf1a6271401 # v3.90.9
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified
          version: 3.90.9@sha256:b8541abacdcf6c6a728bf1c9d868cacacb4addec8fbb6d258dc5699b74fad5c5
      - name: Scan full repository
        if: github.event_name == 'schedule' || (github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000')
        uses: trufflesecurity/trufflehog@e88e7d019eb84ca64f6b768c82eb6bf1a6271401 # v3.90.9
        with:
          path: ./
          base: ''
          head: HEAD
          extra_args: --only-verified
          version: 3.90.9@sha256:b8541abacdcf6c6a728bf1c9d868cacacb4addec8fbb6d258dc5699b74fad5c5

  container-scan:
    name: Blocking container scan (high/critical)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Build release images without publishing
        run: |
          docker build --pull=false --build-arg BREVITAS_BUILD_SHA="$GITHUB_SHA" --tag brevitas-api:ci .
          docker build --pull=false --file services/compress/Dockerfile --tag brevitas-compressor:ci .
          test "$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' brevitas-api:ci)" = "$GITHUB_SHA"
      - name: Save images for scanning
        run: |
          docker save --output /tmp/brevitas-api.tar brevitas-api:ci
          docker save --output /tmp/brevitas-compressor.tar brevitas-compressor:ci
      - name: Pull pinned Trivy scanner
        run: docker pull aquasec/trivy@sha256:a22415a38938a56c379387a8163fcb0ce38b10ace73e593475d3658d578b2436
      - name: Scan API image
        run: |
          docker run --rm \
            --volume /tmp/brevitas-api.tar:/tmp/image.tar:ro \
            --volume trivy-db-cache:/root/.cache/trivy \
            aquasec/trivy@sha256:a22415a38938a56c379387a8163fcb0ce38b10ace73e593475d3658d578b2436 \
            image --input /tmp/image.tar --format table --exit-code 1 --ignore-unfixed --vuln-type os,library --severity HIGH,CRITICAL
      - name: Scan compressor image
        run: |
          docker run --rm \
            --volume /tmp/brevitas-compressor.tar:/tmp/image.tar:ro \
            --volume trivy-db-cache:/root/.cache/trivy \
            aquasec/trivy@sha256:a22415a38938a56c379387a8163fcb0ce38b10ace73e593475d3658d578b2436 \
            image --input /tmp/image.tar --format table --exit-code 1 --ignore-unfixed --vuln-type os,library --severity HIGH,CRITICAL
